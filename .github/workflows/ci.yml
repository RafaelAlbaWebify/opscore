name: OPSCORE CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: opscore-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Prepare artifacts
        run: mkdir -p artifacts
      - name: Lint
        run: python -m ruff check . 2>&1 | tee artifacts/ruff.txt
      - name: Type check
        run: python -m mypy src 2>&1 | tee artifacts/mypy.txt
      - name: Tests
        run: python -m pytest --junitxml=artifacts/test-results.xml
      - name: Demo
        run: python -m opscore.cli demo --workspace artifacts/demo
      - name: Import correlation proof
        run: python -m opscore.cli correlate --workspace artifacts/imported
      - name: Environment manifest
        if: always()
        run: |
          python --version > artifacts/python-version.txt
          python -m pip freeze > artifacts/dependencies.txt
          {
            echo "# OPSCORE Linux verification"
            echo
            echo "- Commit: $GITHUB_SHA"
            echo "- Run: $GITHUB_RUN_ID"
            echo "- Result: ${{ job.status }}"
          } > artifacts/verification-summary.md
      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opscore-linux-proof-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  windows-verification:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        shell: pwsh
        run: python -m pip install -e ".[dev]"
      - name: Verify
        shell: pwsh
        run: .\OPSCORE.ps1 verify
      - name: Demo
        shell: pwsh
        run: .\OPSCORE.ps1 demo
      - name: Correlate imports
        shell: pwsh
        run: .\OPSCORE.ps1 correlate
      - name: Export review package
        shell: pwsh
        run: .\scripts\export-review.ps1 -SkipVerification
      - name: Collect proof
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          if (Test-Path .opscore-data) { Copy-Item .opscore-data artifacts\demo -Recurse -Force }
          Get-ChildItem $HOME\Downloads\OPSCORE_REVIEW_*.zip -ErrorAction SilentlyContinue | Copy-Item -Destination artifacts -Force
          python --version | Set-Content artifacts\python-version.txt
          python -m pip freeze | Set-Content artifacts\dependencies.txt
      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opscore-windows-proof-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30
