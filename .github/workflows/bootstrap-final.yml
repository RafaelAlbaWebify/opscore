name: OPSCORE final repository bootstrap

on:
  push:
    paths:
      - .github/workflows/bootstrap-final.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  populate-repository:
    if: github.actor == 'RafaelAlbaWebify'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reassemble verified source package
        run: |
          test "$(find bootstrap -name 'part-*.b64' | wc -l)" -eq 6
          cat bootstrap/part-*.b64 | base64 --decode > /tmp/opscore.zip
          unzip -t /tmp/opscore.zip
          mkdir -p /tmp/opscore-source
          unzip -q /tmp/opscore.zip -d /tmp/opscore-source

      - name: Populate clean repository tree
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name README.md ! -name .github ! -name bootstrap -exec rm -rf {} +
          cp -a /tmp/opscore-source/. .
          rm -rf .mypy_cache .ruff_cache .pytest_cache .opscore-data artifacts
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          rm -f .coverage
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap.yml .github/workflows/bootstrap-final.yml

      - name: Commit OPSCORE M1 source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build OPSCORE M1 import correlation baseline"
          git push origin HEAD:main
